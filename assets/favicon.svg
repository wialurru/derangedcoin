  <circle cx="16" cy="16" r="15" fill="#1a1a2e"/>
  <circle cx="16" cy="16" r="14" fill="#0f0f1a" stroke="#4ECDC4" stroke-width="1"/>
  
  <!-- Simplified Penguin -->
  <!-- Body -->
  <ellipse cx="16" cy="20" rx="6" ry="8" fill="#1a1a2e"/>
  <ellipse cx="16" cy="21" rx="4" ry="6" fill="#ffffff"/>
  
  <!-- Head -->
  <circle cx="16" cy="11" r="5" fill="#1a1a2e"/>
