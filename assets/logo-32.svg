<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="#1a1a2e"/>
  <circle cx="16" cy="16" r="14" fill="#0f0f1a" stroke="#4ECDC4" stroke-width="0.5"/>
  
  <!-- Mountains -->
  <polygon points="6,24 11,18 16,24" fill="#2a2a4e"/>
  <polygon points="12,24 18,15 24,24" fill="#3a3a5e"/>
  
  <!-- Penguin Body -->
  <ellipse cx="16" cy="21" rx="4" ry="5" fill="#1a1a2e"/>
  
  <!-- Penguin White Belly -->
  <ellipse cx="16" cy="21.5" rx="2.5" ry="3.5" fill="#ffffff"/>
  
  <!-- Penguin Head -->
  <circle cx="16" cy="15" r="3.5" fill="#1a1a2e"/>
  
  <!-- Penguin Face -->
  <ellipse cx="16" cy="15.5" rx="2" ry="2" fill="#ffffff"/>
  
  <!-- Eyes -->
  <circle cx="17" cy="14.5" r="0.7" fill="#1a1a2e"/>
  <circle cx="15" cy="14.5" r="0.7" fill="#1a1a2e"/>
  
  <!-- Beak -->
  <polygon points="16,16 17.5,17 16,17.5 14.5,17" fill="#e74c3c"/>
  
  <!-- Feet -->
  <ellipse cx="15" cy="26" rx="1.2" ry="0.6" fill="#e74c3c"/>
  <ellipse cx="17" cy="26" rx="1.2" ry="0.6" fill="#e74c3c"/>
</svg>
